changelog:
  exclude:
    labels:
      - chore
      - docs
      - refactor
      - test
      - ci
      - build
    authors:
      - dependabot[bot]
      - github-actions[bot]
  categories:
    - title: 新功能
      labels:
        - feature
        - enhancement
    - title: 问题修复
      labels:
        - fix
        - bug
    - title: 界面优化
      labels:
        - ui
        - ux
    - title: 性能改进
      labels:
        - perf
    - title: 其他改动
      labels:
        - "*"
