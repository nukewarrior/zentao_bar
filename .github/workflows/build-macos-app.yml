name: Build macOS App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEFAULT_FEED_URL: https://nukewarrior.github.io/zentao_bar/appcast.xml

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      architecture:
        description: Build architecture
        required: true
        default: apple-silicon
        type: choice
        options:
          - apple-silicon
          - intel
          - universal
      version:
        description: App version (for example 0.1.0). Leave blank to use 0.1.<run_number>.
        required: false
        default: ""
        type: string
      build_number:
        description: Bundle build number. Leave blank to use the GitHub run number.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build-single:
    name: Build selected app
    if: ${{ github.event_name == 'push' || inputs.architecture != 'universal' }}
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.architecture == 'intel' && 'macos-15-intel' || 'macos-15' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            CONFIGURATION="${{ inputs.configuration }}"
            ARCHITECTURE="${{ inputs.architecture }}"
            RAW_VERSION="${{ inputs.version }}"
            RAW_BUILD_NUMBER="${{ inputs.build_number }}"
          else
            CONFIGURATION="debug"
            ARCHITECTURE="apple-silicon"
            RAW_VERSION=""
            RAW_BUILD_NUMBER=""
          fi

          if [[ -z "${RAW_VERSION}" ]]; then
            VERSION="0.1.${GITHUB_RUN_NUMBER}"
          else
            VERSION="${RAW_VERSION}"
          fi

          if [[ -z "${RAW_BUILD_NUMBER}" ]]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          else
            BUILD_NUMBER="${RAW_BUILD_NUMBER}"
          fi

          if [[ "${ARCHITECTURE}" == "intel" ]]; then
            ARCHS="x86_64"
            MACHINE_ARCH="x86_64"
          else
            ARCHS="arm64"
            MACHINE_ARCH="arm64"
          fi

          if [[ "${CONFIGURATION}" == "release" ]]; then
            APP_BASENAME="ZentaoBar"
          else
            APP_BASENAME="ZentaoBar-${CONFIGURATION}"
          fi

          SAFE_VERSION="${VERSION//\//-}"
          SAFE_VERSION="${SAFE_VERSION// /-}"
          BASE_NAME="ZentaoBar-v${SAFE_VERSION}-${CONFIGURATION}-${ARCHITECTURE}"

          echo "configuration=${CONFIGURATION}" >> "${GITHUB_OUTPUT}"
          echo "architecture=${ARCHITECTURE}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${BUILD_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "archs=${ARCHS}" >> "${GITHUB_OUTPUT}"
          echo "machine_arch=${MACHINE_ARCH}" >> "${GITHUB_OUTPUT}"
          echo "app_basename=${APP_BASENAME}" >> "${GITHUB_OUTPUT}"
          echo "base_name=${BASE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Generate Xcode project
        shell: bash
        run: xcodegen generate

      - name: Show toolchain info
        shell: bash
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          swift --version
          uname -m

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ci-output/logs ci-output/bundles ci-output/dist

          LOG_PATH="ci-output/logs/${{ steps.meta.outputs.base_name }}-build.log"

          xcodebuild \
            -project ZentaoBar.xcodeproj \
            -scheme ZentaoBar \
            -configuration "${{ steps.meta.outputs.configuration }}" \
            -derivedDataPath DerivedData \
            -destination "generic/platform=macOS" \
            ARCHS="${{ steps.meta.outputs.archs }}" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.meta.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.meta.outputs.build_number }}" \
            SPARKLE_FEED_URL="${DEFAULT_FEED_URL}" \
            SPARKLE_PUBLIC_ED_KEY="SPARKLE_PUBLIC_ED_KEY_PLACEHOLDER" \
            build 2>&1 | tee "${LOG_PATH}"

          SOURCE_APP="DerivedData/Build/Products/${{ steps.meta.outputs.configuration == 'release' && 'Release' || 'Debug' }}/ZentaoBar.app"
          SOURCE_FRAMEWORK="DerivedData/Build/Products/${{ steps.meta.outputs.configuration == 'release' && 'Release' || 'Debug' }}/Sparkle.framework"
          TARGET_APP="ci-output/bundles/${{ steps.meta.outputs.app_basename }}.app"
          ZIP_PATH="ci-output/dist/${{ steps.meta.outputs.app_basename }}.app.zip"
          INFO_PATH="ci-output/logs/${{ steps.meta.outputs.base_name }}-build-info.txt"

          if [[ ! -f "${SOURCE_APP}/Contents/Resources/Assets.car" ]]; then
            echo "error: expected compiled asset catalog at ${SOURCE_APP}/Contents/Resources/Assets.car" >&2
            exit 1
          fi

          if [[ -d "${SOURCE_FRAMEWORK}" ]]; then
            mkdir -p "${SOURCE_APP}/Contents/Frameworks"
            rm -rf "${SOURCE_APP}/Contents/Frameworks/Sparkle.framework"
            cp -R "${SOURCE_FRAMEWORK}" "${SOURCE_APP}/Contents/Frameworks/Sparkle.framework"
            codesign --force --sign - --timestamp=none \
              "${SOURCE_APP}/Contents/Frameworks/Sparkle.framework"
            codesign --force --sign - --timestamp=none \
              "${SOURCE_APP}"
          fi

          rm -rf "${TARGET_APP}"
          cp -R "${SOURCE_APP}" "${TARGET_APP}"
          ditto -c -k --sequesterRsrc --keepParent "${TARGET_APP}" "${ZIP_PATH}"

          {
            echo "product=ZentaoBar"
            echo "version=${{ steps.meta.outputs.version }}"
            echo "build_number=${{ steps.meta.outputs.build_number }}"
            echo "configuration=${{ steps.meta.outputs.configuration }}"
            echo "machine_arch=${{ steps.meta.outputs.machine_arch }}"
            echo "artifact_base_name=${{ steps.meta.outputs.base_name }}"
          } > "${INFO_PATH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base_name }}
          path: |
            ci-output/dist/${{ steps.meta.outputs.app_basename }}.app.zip
            ci-output/logs/${{ steps.meta.outputs.base_name }}-build.log
            ci-output/logs/${{ steps.meta.outputs.base_name }}-build-info.txt
          if-no-files-found: error

  build-universal:
    name: Build universal app
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.architecture == 'universal' }}
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          CONFIGURATION="${{ inputs.configuration }}"
          RAW_VERSION="${{ inputs.version }}"
          RAW_BUILD_NUMBER="${{ inputs.build_number }}"

          if [[ -z "${RAW_VERSION}" ]]; then
            VERSION="0.1.${GITHUB_RUN_NUMBER}"
          else
            VERSION="${RAW_VERSION}"
          fi

          if [[ -z "${RAW_BUILD_NUMBER}" ]]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          else
            BUILD_NUMBER="${RAW_BUILD_NUMBER}"
          fi

          if [[ "${CONFIGURATION}" == "release" ]]; then
            APP_BASENAME="ZentaoBar"
          else
            APP_BASENAME="ZentaoBar-${CONFIGURATION}"
          fi

          SAFE_VERSION="${VERSION//\//-}"
          SAFE_VERSION="${SAFE_VERSION// /-}"
          BASE_NAME="ZentaoBar-v${SAFE_VERSION}-${CONFIGURATION}-universal"

          echo "configuration=${CONFIGURATION}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${BUILD_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "app_basename=${APP_BASENAME}" >> "${GITHUB_OUTPUT}"
          echo "base_name=${BASE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Generate Xcode project
        shell: bash
        run: xcodegen generate

      - name: Show toolchain info
        shell: bash
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          swift --version
          uname -m

      - name: Build universal app bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ci-output/logs ci-output/bundles ci-output/dist

          LOG_PATH="ci-output/logs/${{ steps.meta.outputs.base_name }}-build.log"

          xcodebuild \
            -project ZentaoBar.xcodeproj \
            -scheme ZentaoBar \
            -configuration "${{ steps.meta.outputs.configuration }}" \
            -derivedDataPath DerivedData \
            -destination "generic/platform=macOS" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.meta.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.meta.outputs.build_number }}" \
            SPARKLE_FEED_URL="${DEFAULT_FEED_URL}" \
            SPARKLE_PUBLIC_ED_KEY="SPARKLE_PUBLIC_ED_KEY_PLACEHOLDER" \
            build 2>&1 | tee "${LOG_PATH}"

          SOURCE_APP="DerivedData/Build/Products/${{ steps.meta.outputs.configuration == 'release' && 'Release' || 'Debug' }}/ZentaoBar.app"
          SOURCE_FRAMEWORK="DerivedData/Build/Products/${{ steps.meta.outputs.configuration == 'release' && 'Release' || 'Debug' }}/Sparkle.framework"
          TARGET_APP="ci-output/bundles/${{ steps.meta.outputs.app_basename }}.app"
          ZIP_PATH="ci-output/dist/${{ steps.meta.outputs.app_basename }}.app.zip"
          INFO_PATH="ci-output/logs/${{ steps.meta.outputs.base_name }}-build-info.txt"

          if [[ -d "${SOURCE_FRAMEWORK}" ]]; then
            mkdir -p "${SOURCE_APP}/Contents/Frameworks"
            rm -rf "${SOURCE_APP}/Contents/Frameworks/Sparkle.framework"
            cp -R "${SOURCE_FRAMEWORK}" "${SOURCE_APP}/Contents/Frameworks/Sparkle.framework"
            codesign --force --sign - --timestamp=none \
              "${SOURCE_APP}/Contents/Frameworks/Sparkle.framework"
            codesign --force --sign - --timestamp=none \
              "${SOURCE_APP}"
          fi

          rm -rf "${TARGET_APP}"
          cp -R "${SOURCE_APP}" "${TARGET_APP}"
          ditto -c -k --sequesterRsrc --keepParent "${TARGET_APP}" "${ZIP_PATH}"

          {
            echo "product=ZentaoBar"
            echo "version=${{ steps.meta.outputs.version }}"
            echo "build_number=${{ steps.meta.outputs.build_number }}"
            echo "configuration=${{ steps.meta.outputs.configuration }}"
            echo "machine_arch=universal"
            echo "artifact_base_name=${{ steps.meta.outputs.base_name }}"
          } > "${INFO_PATH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base_name }}
          path: |
            ci-output/dist/${{ steps.meta.outputs.app_basename }}.app.zip
            ci-output/logs/${{ steps.meta.outputs.base_name }}-build.log
            ci-output/logs/${{ steps.meta.outputs.base_name }}-build-info.txt
          if-no-files-found: error
