name: Release macOS App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PAGES_BASE_URL: https://nukewarrior.github.io/zentao_bar

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: expected a semantic version tag like v1.2.3 but got ${TAG}" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          BUILD_NUMBER="${VERSION}"

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${BUILD_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate Xcode project
        shell: bash
        run: xcodegen generate

      - name: Show toolchain info
        shell: bash
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          swift --version
          uname -m

      - name: Build release universal app
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ci-output/logs ci-output/bundles ci-output/dist ci-output/release

          LOG_PATH="ci-output/logs/ZentaoBar-${{ steps.meta.outputs.tag }}-release-universal-build.log"

          xcodebuild \
            -project ZentaoBar.xcodeproj \
            -scheme ZentaoBar \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "generic/platform=macOS" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.meta.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.meta.outputs.build_number }}" \
            build 2>&1 | tee "${LOG_PATH}"

          SOURCE_APP="DerivedData/Build/Products/Release/ZentaoBar.app"
          TARGET_APP="ci-output/bundles/ZentaoBar.app"
          ZIP_PATH="ci-output/dist/ZentaoBar.app.zip"
          INFO_PATH="ci-output/logs/ZentaoBar-${{ steps.meta.outputs.tag }}-release-universal-build-info.txt"

          if [[ ! -f "${SOURCE_APP}/Contents/Resources/Assets.car" ]]; then
            echo "error: expected compiled asset catalog at ${SOURCE_APP}/Contents/Resources/Assets.car" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${SOURCE_APP}"

          rm -rf "${TARGET_APP}"
          cp -R "${SOURCE_APP}" "${TARGET_APP}"
          ditto -c -k --sequesterRsrc --keepParent "${TARGET_APP}" "${ZIP_PATH}"

          {
            echo "product=ZentaoBar"
            echo "tag=${{ steps.meta.outputs.tag }}"
            echo "version=${{ steps.meta.outputs.version }}"
            echo "build_number=${{ steps.meta.outputs.build_number }}"
            echo "configuration=release"
            echo "machine_arch=universal"
          } > "${INFO_PATH}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.meta.outputs.tag }}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release delete-asset "${TAG}" "ZentaoBar.app.zip" --yes || true
            gh release edit "${TAG}" \
              --title "${TAG}" \
              --notes-file <(gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="${TAG}" --jq '.body')
          else
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi

          gh release upload "${TAG}" ci-output/dist/ZentaoBar.app.zip --clobber
          gh api repos/${{ github.repository }}/releases/tags/${TAG} > ci-output/release/release.json

      - name: Prepare pages content
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          PAGES_BASE_URL: ${{ env.PAGES_BASE_URL }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ci-pages/notes ci-output/release

          if ! curl -fsSL "${PAGES_BASE_URL}/releases.json" -o ci-output/release/releases-existing.json; then
            echo "[]" > ci-output/release/releases-existing.json
          fi

          jq -r '.body' ci-output/release/release.json > ci-output/release/release-notes.md

          python3 scripts/render_release_notes.py \
            --title "ZentaoBar ${RELEASE_TAG}" \
            --input ci-output/release/release-notes.md \
            --output "ci-pages/notes/${RELEASE_TAG}.html"

          ARCHIVE_URL="$(jq -r '.assets[] | select(.name == "ZentaoBar.app.zip") | .browser_download_url' ci-output/release/release.json)"
          PUBLISHED_AT="$(jq -r '.published_at' ci-output/release/release.json)"
          RELEASE_PAGE_URL="$(jq -r '.html_url' ci-output/release/release.json)"

          python3 scripts/write_release_metadata.py \
            --tag "${RELEASE_TAG}" \
            --version "${RELEASE_VERSION}" \
            --build-number "${RELEASE_BUILD_NUMBER}" \
            --published-at "${PUBLISHED_AT}" \
            --archive-url "${ARCHIVE_URL}" \
            --release-page-url "${RELEASE_PAGE_URL}" \
            --notes-url "${PAGES_BASE_URL}/notes/${RELEASE_TAG}.html" \
            --output ci-output/release/current-release.json

          python3 scripts/upsert_release_metadata.py \
            --existing ci-output/release/releases-existing.json \
            --entry ci-output/release/current-release.json \
            --output ci-pages/releases.json

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ci-pages

  deploy-pages:
    name: Deploy release metadata to GitHub Pages
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
